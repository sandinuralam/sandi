<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sandi Nur Alam Sidik - UNIPI</title>



<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  background: #0e0e10;
  color: #eaeaea;
  line-height: 1.6;
}

/* layout */
.container {
  max-width: 900px;
  margin: 0 auto;
  padding: 100px 24px;
}

/* hero */
h1 {
  font-size: 52px;
  font-weight: 700;
  letter-spacing: -1px;
  margin-bottom: 12px;
}

.highlight {
  color: #6aa6ff;
}

.subtitle {
  font-size: 18px;
  color: #a1a1a1;
  max-width: 600px;
}

/* section */
.section {
  margin-top: 80px;
}

.section h2 {
  font-size: 22px;
  margin-bottom: 12px;
  color: #ffffff;
}

.card {
  background: #16161a;
  border: 1px solid #232329;
  padding: 20px;
  border-radius: 12px;
  margin-top: 12px;
  transition: 0.2s;
}

.card:hover {
  border-color: #6aa6ff;
  transform: translateY(-2px);
}

/* tag */
.tags {
  margin-top: 10px;
}

.tag {
  display: inline-block;
  padding: 6px 10px;
  border-radius: 8px;
  background: #1f1f25;
  margin-right: 6px;
  font-size: 12px;
  color: #bdbdbd;
}

/* footer */
footer {
  margin-top: 100px;
  font-size: 13px;
  color: #666;
  text-align: center;
}
</style>
</head>

<body>

<div class="container">

  <!-- HERO -->
  <h1>Sandi Nur Alam Sidik<span class="highlight"><br>UNIPI</span></h1>
  <p class="subtitle">
  </p>

  <!-- ABOUT -->
  <div class="section">
    <h2>Tentang Saya</h2>
    <div class="card">
     Saya suka maen bola sama game dan berenang 
    </div>
  </div>

  <!-- SKILL -->
  <div class="section">
    <h2>Skill</h2>
    <div class="card">
      Bisa maen bola 
      <div class="tags">
      </div>
    </div>
  </div>

  <!-- CONTACT -->
  <div class="section">
    <h2>Kontak</h2>
    <div class="card">
      089504890704
    </div>
  </div>

  <footer>
    
  </footer>

</div>

</body>
</html>
